<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala</title>

    <!-- tailwind and daisyUI cdn -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font family poppins -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<!-- font hind siliguri -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- font awesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

        <style>
            .font-poppins {
        font-family: "Poppins", sans-serif;
        font-weight: 400;
        font-style: normal;
        }

        .font-hind-siliguri{
            font-family: "Hind Siliguri", sans-serif;
        }
        </style>
</head>
<body class="font-poppins container mx-auto">
    <!-- header -->
    <header class="">
        <nav class="navbar bg-[#9fbfde96] shadow-sm">
  <div class="flex-1">
    <span class="flex items-center text-xl font-bold">English
        <img src="./assets/logo.png" alt="">
        <span class="font-hind-siliguri">জানালা</span>
    </span>

  </div>
  <div class="flex-none menu menu-horizontal px-1 space-x-3">
      <button class="btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i> FAQ</button>
      <button class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i> Learn</button>
      <button class="btn btn-outline btn-primary"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
  </div>
</nav>
    </header>

    <main>
        <!-- hero section started -->
         <section class="w-11/12 mx-auto pt-8 lg:flex justify-between items-center space-y-6 lg:space-y-0">
    <div class="lg:w-1/2">
        <h2 class="text-5xl font-bold"><span class="text-[#00BCFF]">English</span> is Easy!!</h2>
      <p class="py-6 font-medium lg:w-10/12 text-[#18181B] font-hind-siliguri">
        আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
      </p>
    <!-- form -->
    <div class="max-w-sm">
        <fieldset class="fieldset space-y-5">
          <input type="text" class="input" placeholder="Enter Your name" />
          <input type="password" class="input font-bold" placeholder="............" />
          <button class="btn btn-primary w-[150px]">Get Started</button>
        </fieldset>
      </div>
    </div>
   
    <div class="lg:w-1/2">
       <img class="mx-auto" src="./assets/hero-student.png" alt="">
    </div>
  </div>
         </section>

         <!-- ------------- -->
         <!--Learn vocabulary section -->
          <section class="w-11/12 mx-auto text-center space-y-9 my-20">
            <h2 class="text-4xl font-bold"><span class="text-[#00BCFF]">Let's</span> Learn Vocabularies</h2>

            <!-- dynamic button div -->
            <div id="levelBtnSection" class="flex gap-5 justify-center flex-wrap">
            
            </div>

            <!-- default no lesson section -->
             <section id="noLessonSection" class="font-hind-siliguri bg-[#F8F8F8] rounded-sm py-16">
                <img class="mx-auto" src="./assets/alert-error.png" alt="">
                <p class="text-[#79716B] font-medium">এই Lesson এ এখনো কোন Vocabulary যুক্ত করা হয়নি।</p>
                <h4 class="text-[#292524] font-bold text-2xl">নেক্সট Lesson এ যান</h4>
             </section>

             <!-- words section -->
             <section id="wordsSection" class="hidden bg-[#F8F8F8] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 p-5">

             </section>

          </section>

    </main>

    <!-- footer -->
     <footer>

     </footer>

     <!-- script file here -->
      <script src="./js/script.js"></script>
</body>
</html>
